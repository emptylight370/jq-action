name: Test

on:
  push:
    branches:
      - main
    paths:
      - action.yml
      - .github/workflows/test.yml
  workflow_dispatch:
  schedule:
    - cron: 0 0 1 * *

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get metadata
        id: step1
        uses: ./
        with:
          data: metadata.json
          filter: .version

      - name: Get json string data
        id: step2
        uses: ./
        with:
          data: '{"name": "query result"}'
          filter: .name

      - name: Get subfolder file data
        id: step3
        uses: ./
        with:
          data: test/theme.json
          filter: .version

      - name: Sort json string data
        id: step4
        uses: ./
        with:
          data: '{"c":3,"b":2,"a":1}'
          filter: .
          options: --indent 0 --sort-keys

      - name: Show output
        run: |
          echo Step 1: ${{ steps.step1.outputs.result }}
          echo Step 2: ${{ steps.step2.outputs.result }}
          echo Step 3: ${{ steps.step3.outputs.result }}
          echo Step 4: ${{ steps.step4.outputs.result }}
